<!DOCTYPE html>
<html>
<head>
    <title>CloudAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <header>
        <h1>☁ CloudAI</h1>
        <p>Cloud-Based Prompt System</p>
    </header>

    <!-- CHAT SECTION START -->
    <div class="chat-box" id="chatBox">

        {% if user_prompt %}
            <div class="message user">
                {{ user_prompt }}
            </div>
        {% endif %}

        {% if response %}
            <div class="message bot">
                {{ response }}
            </div>
        {% else %}
            <div class="message bot">
                Hello! Welcome to the Cloud-Based Prompt System.
            </div>
        {% endif %}

    </div>
    <!-- CHAT SECTION END -->

    <form method="POST" class="input-area">
        <input type="text" name="prompt" placeholder="Ask something..." required>
        <button type="submit">Send</button>
    </form>

</div>

</body>
</html>
