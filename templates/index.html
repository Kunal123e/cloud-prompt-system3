<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud AI System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- Background Particles -->
    <div id="particles"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="logo">☁ CloudAI</div>
        <button id="themeToggle">🌙</button>
    </nav>

    <!-- Chat Container -->
    <div class="chat-container">

        <div class="chat-box" id="chatBox">
            {% if response %}
            <div class="message bot">
                <div class="typing" id="typingEffect">{{ response }}</div>
            </div>
            {% endif %}
        </div>

        <form method="POST" class="input-area">
            <input type="text" name="prompt" placeholder="Ask something..." required>
            <button type="submit">Send</button>
        </form>

    </div>

    <!-- Footer -->
    <footer>
        Built with Flask | Cloud-Based Prompt System
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
